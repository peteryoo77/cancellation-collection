<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IGSchedule</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; background: #F8F9FA; }
    .design-wrapper {
      width: 100%;
      max-width: 1440px;
      margin: 0 auto;
    }
    .design-wrapper img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="design-wrapper">
    <object type="image/svg+xml" data="homescreen.svg" style="width:100%;height:auto;display:block;"></object>
  </div>
</body>
</html>
